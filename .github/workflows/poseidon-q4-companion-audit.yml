name: Poseidon q4 sparse companion audit

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Pin official verifier
        run: |
          rm -rf official_poseidon_tools
          git clone --quiet https://github.com/khovratovich/poseidon-tools.git official_poseidon_tools
          git -C official_poseidon_tools checkout --quiet 60075da7c0521d9493749a035b1f30d4eda37138
      - name: Search and verify exact candidate
        run: python -u research/poseidon_q4/companion_verifier_collision.py
      - name: Commit result
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add research/poseidon_q4/companion_verifier_result.json
          git diff --cached --quiet && exit 0
          git commit -m 'Record sparse companion verifier collision [skip ci]'
          git pull --rebase origin ${{ github.head_ref }}
          git push origin HEAD:${{ github.head_ref }}
