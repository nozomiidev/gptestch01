name: Build and publish browser demos

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: google/web-game-samples branch, tag, or commit
        required: true
        default: 4310035578c205ff503872face8ec91246314af3

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: web-game-samples-publish
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out launcher
        uses: actions/checkout@v4

      - name: Check out Google web game samples
        uses: actions/checkout@v4
        with:
          repository: google/web-game-samples
          ref: ${{ inputs.upstream_ref || '4310035578c205ff503872face8ec91246314af3' }}
          path: upstream
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            upstream/phaser/package-lock.json
            upstream/pixijs/package-lock.json

      - name: Make PixiJS web-font loading non-fatal
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("upstream/pixijs/src/main.ts")
          text = path.read_text(encoding="utf-8")
          original = 'new FontFaceObserver("Pixelify Sans").load(),'
          replacement = (
              'new FontFaceObserver("Pixelify Sans")'
              '.load(undefined, 1500)'
              '.catch(() => undefined),'
          )
          if original not in text:
              raise SystemExit("Expected PixiJS font-loading expression was not found")
          path.write_text(text.replace(original, replacement, 1), encoding="utf-8")
          PY

      - name: Build Phaser demo
        working-directory: upstream/phaser
        run: |
          npm ci
          npm run build

      - name: Build PixiJS demo
        working-directory: upstream/pixijs
        run: |
          npm ci
          npm run build

      - name: Assemble standalone static site
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site/demos/phaser _site/demos/pixijs _site/demos/plain

          cp -R site/. _site/
          cp -R upstream/phaser/dist/. _site/demos/phaser/
          cp -R upstream/pixijs/dist/. _site/demos/pixijs/
          cp -R upstream/plain-html-js-css/. _site/demos/plain/
          cp upstream/LICENSE _site/UPSTREAM-LICENSE.txt

          rm -rf _site/demos/plain/.git _site/demos/plain/.github
          touch _site/.nojekyll

          # These samples target YouTube Playables. Keep the real SDK in that
          # environment, while providing harmless local fallbacks on the open web.
          for demo in phaser pixijs plain; do
            cp site/playables-shim.js "_site/demos/${demo}/playables-shim.js"
          done

          python - <<'PY'
          from pathlib import Path

          marker = '<script src="https://www.youtube.com/game_api/v1"></script>'
          addition = marker + '\n    <script src="./playables-shim.js"></script>'

          for path in (
              Path("_site/demos/phaser/index.html"),
              Path("_site/demos/pixijs/index.html"),
              Path("_site/demos/plain/index.html"),
          ):
              text = path.read_text(encoding="utf-8")
              if "playables-shim.js" not in text:
                  if marker not in text:
                      raise SystemExit(f"YouTube SDK marker missing in {path}")
                  text = text.replace(marker, addition, 1)
                  path.write_text(text, encoding="utf-8")
          PY

          UPSTREAM_REVISION="$(git -C upstream rev-parse HEAD)"
          BUILD_TIME="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          cat > _site/build-info.json <<JSON
          {
            "upstreamRepository": "google/web-game-samples",
            "upstreamRevision": "${UPSTREAM_REVISION}",
            "builtAt": "${BUILD_TIME}",
            "workflowRun": "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          }
          JSON

      - name: Verify assembled output
        shell: bash
        run: |
          set -euo pipefail
          test -f _site/index.html
          test -f _site/demos/phaser/index.html
          test -f _site/demos/pixijs/index.html
          test -f _site/demos/plain/index.html
          test -f _site/demos/phaser/playables-shim.js
          test -f _site/demos/pixijs/playables-shim.js
          test -f _site/demos/plain/playables-shim.js
          test -f _site/build-info.json
          grep -q 'playables-shim.js' _site/demos/phaser/index.html
          grep -q 'playables-shim.js' _site/demos/pixijs/index.html
          grep -q 'playables-shim.js' _site/demos/plain/index.html
          find _site -type f | sort

      - name: Upload downloadable production artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-game-playground
          path: _site
          if-no-files-found: error
          retention-days: 14

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Mirror production files to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          force_orphan: true
          enable_jekyll: false
          commit_message: "Publish browser demos from ${{ github.sha }}"

  deploy-pages:
    needs: build-and-publish
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
