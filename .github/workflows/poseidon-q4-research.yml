name: poseidon-q4-research

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Clone pinned official verifier
        run: |
          git clone --quiet https://github.com/khovratovich/poseidon-tools.git official
          cd official
          git checkout --quiet 60075da7c0521d9493749a035b1f30d4eda37138
      - name: Search scalable structured verifier collisions
        run: |
          cat > /tmp/search.py <<'PY'
          import json
          import sys
          sys.path.insert(0, 'official')

          from poseidon.poseidon import Poseidon
          from poseidon.mds_matrix import _char_poly, _poly_is_irreducible, verify_mds_matrix
          from bounties.partial_collision_verifier import (
              _hash, verify_collision_solution, COLLISION_P, COLLISION_ALPHA,
              COLLISION_ELL, COLLISION_RF, COLLISION_RP, COLLISION_TPERM,
          )

          p = COLLISION_P
          n = COLLISION_TPERM
          R = COLLISION_RF + COLLISION_RP

          def companion(a, b, k):
              # Characteristic polynomial x^16 + a*x^k + b.
              M = [[0] * n for _ in range(n)]
              for i in range(n - 1):
                  M[i][i + 1] = 1
              M[n - 1][0] = (-b) % p
              M[n - 1][k] = (-a) % p
              return M

          def support_trace(k, start):
              supp = {start}
              trace = [sorted(supp)]
              for _ in range(R):
                  nxt = {j - 1 for j in supp if j > 0}
                  if 0 in supp or k in supp:
                      nxt.add(n - 1)
                  supp = nxt
                  trace.append(sorted(supp))
              return trace

          def find_for_q(q):
              support_candidates = []
              for k in range(1, n):
                  for start in range(q, n):
                      tr = support_trace(k, start)
                      if all(i >= q for i in tr[-1]):
                          support_candidates.append((len(tr[-1]), k, start, tr[-1]))
              support_candidates.sort()
              for _, k, start, final_support in support_candidates:
                  for b in range(1, 9):
                      for a in range(1, 400):
                          f = [0] * (n + 1)
                          f[0] = b
                          f[k] = a
                          f[n] = 1
                          if not _poly_is_irreducible(f, p):
                              continue
                          M = companion(a, b, k)
                          if _char_poly(M, p) != f:
                              raise RuntimeError('companion orientation error')
                          if not verify_mds_matrix(M, p):
                              continue
                          X = [0] * 15
                          Y = [0] * 15
                          Y[start - 1] = 1
                          ok = verify_collision_solution(
                              X, Y, t=q, prime=p, ell=COLLISION_ELL,
                              r_f=COLLISION_RF, r_p=COLLISION_RP,
                              t_perm=n, alpha=COLLISION_ALPHA, mds=M,
                          )
                          if not ok:
                              continue
                          pos = Poseidon(prime=p, alpha=COLLISION_ALPHA, t=n,
                                         r_f=COLLISION_RF, r_p=COLLISION_RP, mds=M)
                          hx = _hash(X, pos, p, COLLISION_ELL, n)
                          hy = _hash(Y, pos, p, COLLISION_ELL, n)
                          return {
                              'q': q, 'k': k, 'a': a, 'b': b,
                              'start_state_coordinate': start,
                              'message_coordinate': start - 1,
                              'support_after_28': final_support,
                              'X': X, 'Y': Y,
                              'H_X_prefix': hx[:q], 'H_Y_prefix': hy[:q],
                              'verify': ok,
                              'has_zero_entry': any(v == 0 for row in M for v in row),
                              'matrix_last_row': M[-1],
                          }
              return None

          results = []
          for q in range(4, 16):
              r = find_for_q(q)
              results.append(r)
              print('q', q, '=>', None if r is None else {k:v for k,v in r.items() if k not in ('X','Y')}, flush=True)

          with open('poseidon-prefix-results.json', 'w') as f:
              json.dump({'official_commit':'60075da7c0521d9493749a035b1f30d4eda37138',
                         'results':results}, f, indent=2)
          PY
          python /tmp/search.py
      - name: Upload exact result
        uses: actions/upload-artifact@v4
        with:
          name: poseidon-prefix-results
          path: poseidon-prefix-results.json
          retention-days: 1
      - name: Post exact result to temporary PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '```json'
            cat poseidon-prefix-results.json
            echo '```'
          } > /tmp/comment.md
          gh pr comment "${{ github.event.pull_request.number }}" --body-file /tmp/comment.md
