name: poseidon-q4-research

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Clone pinned official verifier
        run: |
          git clone --quiet https://github.com/khovratovich/poseidon-tools.git official
          cd official
          git checkout --quiet 60075da7c0521d9493749a035b1f30d4eda37138
      - name: Find and verify structured q=4 collision
        run: |
          cat > /tmp/search.py <<'PY'
          import json
          import random
          import sys
          sys.path.insert(0, 'official')

          from poseidon.poseidon import Poseidon
          from poseidon.mds_matrix import _char_poly, _poly_is_irreducible, verify_mds_matrix
          from bounties.partial_collision_verifier import (
              _hash, verify_collision_solution, COLLISION_P, COLLISION_ALPHA,
              COLLISION_ELL, COLLISION_RF, COLLISION_RP, COLLISION_TPERM,
          )

          p = COLLISION_P
          n = COLLISION_TPERM

          def companion_axb(a, b):
              M = [[0] * n for _ in range(n)]
              for i in range(n - 1):
                  M[i][i + 1] = 1
              M[n - 1][0] = (-b) % p
              M[n - 1][1] = (-a) % p
              return M

          def support_after(M, start, rounds):
              supp = {start}
              for _ in range(rounds):
                  supp = {i for i in range(n) if any(M[i][j] % p for j in supp)}
              return sorted(supp)

          rng = random.Random(0xC09DE4)
          candidates = [(a, 1) for a in range(1, 200)]
          candidates += [(rng.randrange(1, p), rng.randrange(1, p)) for _ in range(500)]
          found = None
          for idx, (a, b) in enumerate(candidates):
              f = [b % p, a % p] + [0] * 14 + [1]
              if not _poly_is_irreducible(f, p):
                  continue
              M = companion_axb(a, b)
              if _char_poly(M, p) != f:
                  raise RuntimeError('companion orientation error')
              support = support_after(M, 4, COLLISION_RF + COLLISION_RP)
              if any(i < 4 for i in support):
                  continue
              if verify_mds_matrix(M, p):
                  found = (idx, a, b, M, support)
                  break
          if found is None:
              raise RuntimeError('no accepted companion matrix found')

          idx, a, b, M, support = found
          X = [0] * 15
          Y = [0] * 15
          Y[3] = 1
          ok = verify_collision_solution(
              X, Y, t=4, prime=p, ell=COLLISION_ELL,
              r_f=COLLISION_RF, r_p=COLLISION_RP,
              t_perm=n, alpha=COLLISION_ALPHA, mds=M,
          )
          pos = Poseidon(prime=p, alpha=COLLISION_ALPHA, t=n,
                         r_f=COLLISION_RF, r_p=COLLISION_RP, mds=M)
          hx = _hash(X, pos, p, COLLISION_ELL, n)
          hy = _hash(Y, pos, p, COLLISION_ELL, n)
          result = {
              'official_commit': '60075da7c0521d9493749a035b1f30d4eda37138',
              'candidate_index': idx,
              'a': a,
              'b': b,
              'support_after_28': support,
              'X': X,
              'Y': Y,
              'H_X': hx,
              'H_Y': hy,
              'H_X_first4': hx[:4],
              'H_Y_first4': hy[:4],
              'verify_collision_solution_t4': ok,
              'matrix': M,
          }
          with open('poseidon-q4-result.json', 'w') as f:
              json.dump(result, f, indent=2)
          print(json.dumps({k: v for k, v in result.items() if k != 'matrix'}, indent=2))
          if not ok:
              raise RuntimeError('official verifier rejected candidate')
          PY
          python /tmp/search.py
      - name: Upload exact result
        uses: actions/upload-artifact@v4
        with:
          name: poseidon-q4-result
          path: poseidon-q4-result.json
          retention-days: 1
      - name: Post exact result to temporary PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '```json'
            cat poseidon-q4-result.json
            echo '```'
          } > /tmp/comment.md
          gh pr comment "${{ github.event.pull_request.number }}" --body-file /tmp/comment.md
